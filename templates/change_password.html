{% extends 'base.html' %}
{% block title %}Change Password - Hope{% endblock %}
{% block content %}

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo"><span class="logo-icon">❤</span> HopeLink</div>
        <h2>Change Password</h2>
        <p class="auth-sub">Update your account password</p>

        <form method="POST" class="auth-form" id="changePwForm">
            <div class="form-group">
                <label>Current Password</label>
                <div class="password-wrap">
                    <input type="password" name="current_password" id="currentPassword"
                        placeholder="••••••••" required>
                    <button type="button" class="eye-btn"
                        onclick="togglePassword('currentPassword', this)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label>New Password</label>
                <div class="password-wrap">
                    <input type="password" name="new_password" id="newPassword"
                        placeholder="••••••••" required>
                    <button type="button" class="eye-btn"
                        onclick="togglePassword('newPassword', this)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <!-- Strength bar -->
                <div id="strengthBar" style="margin-top:8px;height:4px;border-radius:4px;background:#e5e7eb;overflow:hidden;display:none;">
                    <div id="strengthFill" style="height:100%;width:0%;transition:width .3s,background .3s;border-radius:4px;"></div>
                </div>
                <small id="strengthText" style="display:none;margin-top:4px;font-size:12px;"></small>
                <small id="newPwError" style="color:#ef4444;display:none;margin-top:4px;">
                    Password must be at least 8 characters and include a symbol.
                </small>
            </div>

            <div class="form-group">
                <label>Confirm New Password</label>
                <div class="password-wrap">
                    <input type="password" name="confirm_password" id="confirmPassword"
                        placeholder="••••••••" required>
                    <button type="button" class="eye-btn"
                        onclick="togglePassword('confirmPassword', this)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <small id="matchError" style="color:#ef4444;display:none;margin-top:4px;">
                    Passwords do not match.
                </small>
            </div>

            <button type="submit" class="btn-submit">🔒 Update Password</button>
        </form>

        <div class="auth-footer">
            <a href="{{ url_for('dashboard') }}">← Back to Dashboard</a>
        </div>
    </div>
</div>

<script>
// Live strength checker
document.getElementById('newPassword').addEventListener('input', function() {
    const val = this.value;
    const bar  = document.getElementById('strengthBar');
    const fill = document.getElementById('strengthFill');
    const text = document.getElementById('strengthText');
    const err  = document.getElementById('newPwError');

    if (!val.length) {
        bar.style.display = 'none';
        text.style.display = 'none';
        err.style.display = 'none';
        this.style.border = '';
        return;
    }

    bar.style.display = 'block';
    text.style.display = 'block';

    let score = 0;
    if (val.length >= 8) score++;
    if (val.length >= 12) score++;
    if (/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(val)) score++;
    if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;

    const levels = [
        { label: 'Too weak', color: '#ef4444', width: '20%' },
        { label: 'Weak',     color: '#f97316', width: '40%' },
        { label: 'Fair',     color: '#eab308', width: '60%' },
        { label: 'Good',     color: '#22c55e', width: '80%' },
        { label: 'Strong',   color: '#16a34a', width: '100%' }
    ];
    const level = levels[Math.min(score, 4)];
    fill.style.width = level.width;
    fill.style.background = level.color;
    text.textContent = `Strength: ${level.label}`;
    text.style.color = level.color;

    const valid = val.length >= 8 && /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(val);
    err.style.display = valid ? 'none' : 'block';
    this.style.border = valid ? '1.5px solid #22c55e' : '1.5px solid #ef4444';
});

// Live confirm match
document.getElementById('confirmPassword').addEventListener('input', function() {
    const match = this.value === document.getElementById('newPassword').value;
    document.getElementById('matchError').style.display = match ? 'none' : 'block';
    this.style.border = match ? '1.5px solid #22c55e' : '1.5px solid #ef4444';
});

// Block submit if invalid
document.getElementById('changePwForm').addEventListener('submit', function(e) {
    const newPw   = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;
    const hasLen  = newPw.length >= 8;
    const hasSym  = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(newPw);
    const matches = newPw === confirm;

    if (!hasLen || !hasSym) {
        e.preventDefault();
        document.getElementById('newPwError').style.display = 'block';
    }
    if (!matches) {
        e.preventDefault();
        document.getElementById('matchError').style.display = 'block';
    }
});
</script>

{% endblock %}
