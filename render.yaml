services:
  - type: web
    name: charity-donation
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python init_db.py && gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: charity-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_SECRET
        sync: false        # Set this manually in Render dashboard

databases:
  - name: charity-db
    databaseName: charity_donation
    user: charity_user
